<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Práctica - {{ tema }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='modern-style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        /* ================= Skeleton Loading ================= */
        .skeleton {
            background: var(--gray-200);
            border-radius: var(--border-radius);
            position: relative;
            overflow: hidden;
        }
        .skeleton::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150px;
            height: 100%;
            width: 150px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: loading 1.2s infinite;
        }
        @keyframes loading {
            0% { left: -150px; }
            50% { left: 100%; }
            100% { left: 100%; }
        }
        .skeleton-question {
            margin: 25px 0;
            padding: 25px;
            border-radius: var(--border-radius);
            background: var(--gray-100);
        }

        /* Overlay de evaluación */
        .evaluating-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            border-radius: var(--border-radius-lg);
        }
        .evaluating-overlay .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid var(--gray-200);
            border-top: 6px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg);}
            100% { transform: rotate(360deg);}
        }

        /* Feedback inline */
        .feedback {
            margin-top: 12px;
            padding: 10px 15px;
            border-radius: var(--border-radius);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .feedback.correct {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success-color);
            border-left: 4px solid var(--success-color);
        }
        .feedback.incorrect {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            border-left: 4px solid var(--danger-color);
        }
        .feedback.reflection {
            background: rgba(59, 130, 246, 0.1);
            color: #2563eb;
            border-left: 4px solid #3b82f6;
            display: block;
        }

        /* ================= Mantener estilos originales ================= */
        .evaluation-container {
            background: var(--white);
            border-radius: var(--border-radius-lg);
            padding: 40px;
            margin: 30px 0;
            box-shadow: var(--shadow-lg);
        }
        .evaluation-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .evaluation-header h2 {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .topic-badge {
            display: inline-block;
            background: var(--accent-gradient);
            color: var(--white);
            padding: 8px 20px;
            border-radius: var(--border-radius);
            font-weight: 600;
        }
        .result-stats {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 10px;
            font-weight: 600;
        }
        .result-stats .stat {
            background: var(--gray-100);
            border-radius: var(--border-radius);
            padding: 8px 12px;
            border-left: 4px solid var(--gray-300);
        }
        .result-stats .good { border-left-color: var(--success-color); color: var(--success-color); }
        .result-stats .bad { border-left-color: var(--danger-color); color: var(--danger-color); }
        .result-stats .total { border-left-color: var(--primary-color); color: var(--primary-color); }
        .progress-bar {
            background: var(--gray-200);
            height: 8px;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: var(--primary-gradient);
            height: 100%;
            transition: width 0.3s ease;
            width: 0%;
        }
        .question-item {
            background: var(--gray-50);
            border-radius: var(--border-radius);
            padding: 25px;
            margin: 25px 0;
            border-left: 4px solid var(--primary-color);
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .question-number {
            background: var(--primary-color);
            color: var(--white);
            padding: 8px 15px;
            border-radius: var(--border-radius);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .question-type {
            background: var(--accent-color);
            color: var(--white);
            padding: 6px 12px;
            border-radius: var(--border-radius);
            font-size: 0.8rem;
            font-weight: 500;
        }
        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 20px;
        }
        .options-container {
            margin: 20px 0;
        }
        .option {
            display: block;
            margin: 12px 0;
            padding: 15px 20px;
            background: var(--white);
            border: 2px solid var(--gray-200);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .option:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .option input[type="radio"] {
            display: none;
        }
        .option.selected {
            border-color: var(--primary-color);
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .option.selected::before {
            content: '✓';
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.2rem;
        }
        .open-response {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            border: 2px solid var(--gray-200);
            border-radius: var(--border-radius);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: var(--transition);
        }
        .open-response:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .evaluation-actions {
            text-align: center;
            margin: 40px 0;
            padding: 30px 0;
            border-top: 2px solid var(--gray-200);
        }
        .btn-evaluate {
            background: var(--primary-gradient);
            color: var(--white);
            padding: 15px 40px;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }
        .btn-evaluate:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .btn-evaluate:disabled {
            background: var(--gray-400);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* Indicador de progreso mejorado */
        .progress-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--gray-600);
        }
        
        .progress-indicator .completed {
            color: var(--success-color);
            font-weight: 600;
        }
        
        /* Tooltip informativo */
        .help-tooltip {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gray-800);
            color: var(--white);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }
        
        .help-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 4px solid transparent;
            border-top-color: var(--gray-800);
        }
        
        .btn-evaluate:hover .help-tooltip {
            opacity: 1;
        }

        /* Estados del botón de evaluación */
        .btn-evaluate.ready {
            background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%);
            animation: pulse 2s infinite;
        }
        
        .btn-evaluate.evaluating {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }

        /* Indicador de pool de preguntas */
        #poolInfo.nuevas {
            background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }
        #poolInfo.repaso {
            background: linear-gradient(135deg, #fff8e1 0%, #fffbf0 100%);
            color: #f57f17;
            border: 1px solid #ffe082;
        }

        /* Botón volver al inicio — solo aparece al terminar la evaluación */
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: linear-gradient(135deg, #1a237e, #283593);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(26,35,126,0.35);
            margin-top: 8px;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26,35,126,0.45);
            color: #fff;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="evaluation-container">

        <div class="evaluation-header">
            <h2>📝 Evaluación Práctica</h2>
            <div class="topic-badge">{{ tema }}</div>
            <div id="poolInfo"
                 style="margin: 12px auto 8px; padding: 6px 14px; border-radius: var(--border-radius); font-size: 0.85rem; display: none; max-width: 400px; text-align: center;">
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p>Responde todas las preguntas y presiona "Evaluar" al final</p>
            <div id="fallbackBanner" style="display:none; background: #fff3cd; border: 1px solid #f0c040; border-radius: var(--border-radius); padding: 12px 18px; margin: 15px 0; font-size: 0.95rem; color: #664d03;">
                ⚠️ No se pudieron generar preguntas personalizadas. Intenta de nuevo en unos segundos.
            </div>
            <div id="resultStats" class="result-stats" style="display:none;">
                <div class="stat good">Buenas: <span id="statBuenas">0</span></div>
                <div class="stat bad">Malas: <span id="statMalas">0</span></div>
                <div class="stat total">Total: <span id="statTotal">0</span></div>
            </div>
        </div>

        <!-- Skeleton Loading -->
        <div id="skeletonContainer">
            <div id="loadingPhrases" style="text-align: center; font-size: 1.2rem; font-weight: 600; color: var(--primary-color); margin-bottom: 20px; min-height: 30px; transition: opacity 0.3s ease;">
                Generando conocimiento...
            </div>
            {% for _ in range(10) %}
            <div class="skeleton-question">
                <div class="skeleton" style="width: 120px; height: 20px; margin-bottom: 15px;"></div>
                <div class="skeleton" style="width: 80%; height: 16px; margin-bottom: 10px;"></div>
                <div class="skeleton" style="width: 90%; height: 16px; margin-bottom: 10px;"></div>
                <div class="skeleton" style="width: 70%; height: 16px;"></div>
            </div>
            {% endfor %}
        </div>

        <!-- Contenedor real -->
        <div id="questionsContainer" style="display:none;">
            <form id="evaluationForm">
                <!-- Las preguntas se cargarán dinámicamente aquí -->
            </form>
        </div>
    </div>
</div>

<script>
    let preguntas = [];
    const frasesCarga = [
        "Generando conocimiento...",
        "Calculando probabilidades...",
        "Ajustando la curva de aprendizaje...",
        "Consultando los oráculos de la IA...",
        "Preparando tu desafío personal...",
        "Analizando el nivel académico...",
        "Construyendo ejercicios adaptativos...",
        "Casi listo...",
        "Diseñando preguntas personalizadas...",
        "Afinando la dificultad...",
        "Seleccionando los mejores ejemplos...",
        "Puliendo las explicaciones...",
        "Casi terminamos...",
        "Un momento más..."
    ];
    let fraseIndex = 0;
    let fraseInterval;
    let tiempoEspera = 0;
    let modoLento = false;
    let timeoutRotacion = null;

    function iniciarRotacionFrases() {
        const elementoFrase = document.getElementById('loadingPhrases');
        if (!elementoFrase) return;
        
        fraseInterval = setInterval(() => {
            tiempoEspera += 3.5;

            // A los 25s: pasar a "modo lento" (persistente, no se sobreescribe)
            if (tiempoEspera > 55 && !modoLento) {
                modoLento = true;
                clearInterval(fraseInterval);
                elementoFrase.style.opacity = 0;
                timeoutRotacion = setTimeout(() => {
                    elementoFrase.textContent = "La IA está tardando más de lo normal, por favor espera...";
                    elementoFrase.style.color = "var(--warning-color)";
                    elementoFrase.style.opacity = 1;
                }, 300);
                return;
            }

            if (modoLento) return;

            fraseIndex = (fraseIndex + 1) % frasesCarga.length;
            elementoFrase.style.opacity = 0;
            timeoutRotacion = setTimeout(() => {
                elementoFrase.textContent = frasesCarga[fraseIndex];
                elementoFrase.style.opacity = 1;
            }, 300);
        }, 3500);
    }

    function detenerRotacionFrases() {
        if (fraseInterval) clearInterval(fraseInterval);
        if (timeoutRotacion) clearTimeout(timeoutRotacion);
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('skeletonContainer').style.display = 'block';
        document.getElementById('questionsContainer').style.display = 'none';

        tiempoEspera = 0;
        modoLento = false;
        fraseIndex = 0;
        const elementoFrase = document.getElementById('loadingPhrases');
        if (elementoFrase) {
            elementoFrase.style.color = "var(--primary-color)";
        }
        iniciarRotacionFrases();

        cargarPreguntas();
    });

    async function cargarPreguntas() {
        const elementoFrase = document.getElementById('loadingPhrases');
        try {
            const inicioRed = Date.now();
            const response = await fetch('/generar_preguntas', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    tema: '{{ tema }}'
                })
            });
            
            const resultado = await response.json();
            const tiempoReal = Date.now() - inicioRed;

            if (resultado.success) {
                const fuente = resultado.fuente || 'banco';

                // Delay inteligente: si vino del banco instantáneo, mostramos
                // al menos 700ms de skeleton para no causar un parpadeo
                let delayMinimo = 0;
                if (fuente === 'banco' || fuente === 'cache') {
                    delayMinimo = Math.max(0, 700 - tiempoReal);
                } else if (fuente === 'gemini_live') {
                    delayMinimo = Math.max(0, 1200 - tiempoReal);
                }

                if (delayMinimo > 0) {
                    await new Promise(r => setTimeout(r, delayMinimo));
                }

                // Actualizar el array de preguntas
                preguntas.length = 0;
                preguntas.push(...resultado.preguntas);
                
                // Mostrar banner si es fallback
                if (resultado.fallback) {
                    document.getElementById('fallbackBanner').style.display = 'block';
                }

                // Badge contextual de fuente
                const badgeFuente = {
                    'banco':       { texto: '📚 Preguntas curadas para tu nivel', clase: 'nuevas' },
                    'cache':       { texto: '🔁 Preguntas de sesiones anteriores', clase: 'nuevas' },
                    'gemini_live': { texto: '✨ Preguntas generadas por IA para ti', clase: 'nuevas' },
                    'fallback':    { texto: '⚠️ Usando banco de respaldo', clase: 'repaso' },
                }[fuente] || { texto: '📊 Preguntas cargadas', clase: 'nuevas' };

                // Mostrar info de ronda/pool
                if (resultado.info_ronda) {
                    const r = resultado.info_ronda;
                    const el = document.getElementById('poolInfo');
                    let texto, clase;
                    if (r.en_rotacion) {
                        texto = `🔄 Repaso — has visto todas las ${r.total_pool} preguntas`;
                        clase = 'repaso';
                    } else {
                        texto = `${badgeFuente.texto} · ${r.vistas}/${r.total_pool} vistas`;
                        clase = badgeFuente.clase;
                    }
                    el.textContent = texto;
                    el.className = clase;
                    el.style.display = 'block';
                }

                // Renderizar preguntas dinámicamente
                renderizarPreguntas(resultado.preguntas);
                
                // Ocultar skeleton y mostrar preguntas con fade
                detenerRotacionFrases();
                const skeleton = document.getElementById('skeletonContainer');
                skeleton.style.transition = 'opacity 0.3s ease';
                skeleton.style.opacity = '0';
                setTimeout(() => {
                    skeleton.style.display = 'none';
                    const qc = document.getElementById('questionsContainer');
                    qc.style.opacity = '0';
                    qc.style.display = 'block';
                    qc.style.transition = 'opacity 0.4s ease';
                    requestAnimationFrame(() => { qc.style.opacity = '1'; });
                }, 300);
                
                updateProgress();
            } else {
                detenerRotacionFrases();
                if (elementoFrase) elementoFrase.textContent = 'Error al generar preguntas';
                console.error('Error cargando preguntas:', resultado.error);
                alert('Error generando preguntas: ' + resultado.error);
            }
        } catch (error) {
            detenerRotacionFrases();
            if (elementoFrase) elementoFrase.textContent = 'Error de conexión';
            console.error('Error de conexión:', error);
            alert('Error de conexión al cargar preguntas');
        }
    }

    function renderizarPreguntas(preguntasData) {
        const form = document.getElementById('evaluationForm');
        form.innerHTML = '';
        
        preguntasData.forEach((pregunta, index) => {
            const questionDiv = document.createElement('div');
            questionDiv.className = 'question-item';
            questionDiv.setAttribute('data-question-id', pregunta.id);
            
            let optionsHtml = '';
            if (pregunta.tipo === 'opcion_multiple' || pregunta.tipo === 'verdadero_falso') {
                optionsHtml = '<div class="options-container">';
                for (const [key, value] of Object.entries(pregunta.opciones)) {
                    optionsHtml += `
                        <label class="option" onclick="selectOption(this)">
                            <input type="radio" name="pregunta_${pregunta.id}" value="${key}">
                            <strong>${key}.</strong> ${value}
                        </label>
                    `;
                }
                optionsHtml += '</div>';
            } else if (pregunta.tipo === 'respuesta_abierta') {
                optionsHtml = `
                    <textarea class="open-response" name="pregunta_${pregunta.id}" 
                              placeholder="Escribe tu reflexión o procedimiento aquí (no afecta la nota final, se comparará con la respuesta del experto)..."></textarea>
                `;
            }
            
            const tipoTexto = pregunta.tipo === 'opcion_multiple' ? 'Opción Múltiple' :
                            pregunta.tipo === 'verdadero_falso' ? 'Verdadero/Falso' : 'Ejercicio de Reflexión';
            
            questionDiv.innerHTML = `
                <div class="question-header">
                    <span class="question-number">Pregunta ${index + 1}</span>
                    <span class="question-type">${tipoTexto}</span>
                </div>
                <div class="question-text">${pregunta.pregunta}</div>
                ${optionsHtml}
                <div class="feedback" id="feedback_${pregunta.id}" style="display:none;"></div>
            `;
            
            form.appendChild(questionDiv);
        });
        
        // Agregar botón de evaluación
        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'evaluation-actions';
        actionsDiv.innerHTML = `
            <button type="button" class="btn-evaluate" id="evaluateBtn" onclick="evaluarRespuestas()">
                <span>📊 Evaluar Respuestas</span>
                <span class="help-tooltip">Completa todas las preguntas para habilitar</span>
            </button>
        `;
        form.appendChild(actionsDiv);
    }

    function selectOption(element) {
        const questionContainer = element.closest('.question-item');
        questionContainer.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
        element.classList.add('selected');
        element.querySelector('input[type="radio"]').checked = true;
        updateProgress();
    }

    function updateProgress() {
        const totalQuestions = preguntas.length;
        let answeredQuestions = 0;
        preguntas.forEach(pregunta => {
            const qid = `pregunta_${pregunta.id}`;
            if (pregunta.tipo === 'respuesta_abierta') {
                const val = document.querySelector(`textarea[name="${qid}"]`).value.trim();
                if(val) answeredQuestions++;
            } else {
                if(document.querySelector(`input[name="${qid}"]:checked`)) answeredQuestions++;
            }
        });
        
        // Actualizar barra de progreso
        const progressFill = document.getElementById('progressFill');
        const progressPercent = (answeredQuestions/totalQuestions)*100;
        progressFill.style.width = progressPercent + '%';
        
        // Actualizar botón de evaluación
        const btn = document.getElementById('evaluateBtn');
        
        if (answeredQuestions === totalQuestions) {
            btn.disabled = false;
            btn.classList.add('ready');
            btn.innerHTML = `
                <span>📊 Evaluar Respuestas</span>
                <span class="help-tooltip">¡Listo para evaluar!</span>
            `;
        } else {
            btn.disabled = true;
            btn.classList.remove('ready');
            btn.innerHTML = `
                <span>📊 Evaluar Respuestas</span>
                <span class="help-tooltip">Completa todas las preguntas para habilitar</span>
            `;
        }
        
        // Mostrar indicador de progreso detallado
        updateProgressIndicator(answeredQuestions, totalQuestions);
    }

    function updateProgressIndicator(completed, total) {
        let indicator = document.querySelector('.progress-indicator');
        if (!indicator) {
            indicator = document.createElement('div');
            indicator.className = 'progress-indicator';
            document.querySelector('.progress-bar').parentNode.insertBefore(indicator, document.querySelector('.progress-bar').nextSibling);
        }
        
        const closedQuestions = preguntas.filter(p => p.tipo !== 'respuesta_abierta').length;
        const closedCompleted = preguntas.filter(p => {
            if (p.tipo === 'respuesta_abierta') return false;
            const qid = `pregunta_${p.id}`;
            return document.querySelector(`input[name="${qid}"]:checked`);
        }).length;
        
        const openQuestions = preguntas.filter(p => p.tipo === 'respuesta_abierta').length;
        const openCompleted = preguntas.filter(p => {
            if (p.tipo !== 'respuesta_abierta') return false;
            const qid = `pregunta_${p.id}`;
            return document.querySelector(`textarea[name="${qid}"]`).value.trim();
        }).length;
        
        indicator.innerHTML = `
            <span>Preguntas cerradas: <span class="completed">${closedCompleted}</span>/${closedQuestions}</span>
            <span>•</span>
            <span>Preguntas abiertas: <span class="completed">${openCompleted}</span>/${openQuestions}</span>
            <span>•</span>
            <span>Total: <span class="completed">${completed}</span>/${total}</span>
        `;
    }

    async function evaluarRespuestas() {
        const btn = document.querySelector('.btn-evaluate');
        btn.disabled = true;
        btn.classList.remove('ready');
        btn.classList.add('evaluating');
        btn.innerHTML = `
            <span>🔄 Evaluando...</span>
            <span class="help-tooltip">Analizando tus respuestas...</span>
        `;

        const container = document.getElementById('questionsContainer');
        const overlay = document.createElement('div');
        overlay.className = 'evaluating-overlay';
        overlay.innerHTML = '<div class="spinner"></div><div style="color: var(--gray-600); margin-top: 10px; font-size: 14px; text-align: center;">Procesando respuestas...</div>';
        container.style.position = 'relative';
        container.appendChild(overlay);

        try {
            const respuestas = {};
            preguntas.forEach(pregunta => {
                const qid = `pregunta_${pregunta.id}`;
                if(pregunta.tipo==='respuesta_abierta'){
                    respuestas[pregunta.id] = document.querySelector(`textarea[name="${qid}"]`).value.trim();
                } else {
                    const sel = document.querySelector(`input[name="${qid}"]:checked`);
                    respuestas[pregunta.id] = sel ? sel.value : '';
                }
            });

            const response = await fetch('/evaluar_respuestas',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({tema:'{{ tema }}', preguntas, respuestas})
            });
            const resultado = await response.json();

            if(resultado.success){
                resultado.respuestas.forEach((r,i)=>{
                    const fb = document.getElementById(`feedback_${preguntas[i].id}`);
                    fb.style.display='flex';
                    
                    if (preguntas[i].tipo === 'respuesta_abierta') {
                        // Pregunta abierta - mostrar feedback de reflexión
                        fb.className = 'feedback reflection';
                        fb.innerHTML = `
                            <div style="flex: 1;">
                                <div style="margin-bottom: 12px;">
                                    <strong>📝 Tu respuesta:</strong>
                                    <div style="background: rgba(59, 130, 246, 0.1); padding: 12px; border-radius: 6px; margin-top: 8px; border-left: 3px solid #3b82f6;">
                                        ${respuestas[preguntas[i].id] || '(No respondida)'}
                                    </div>
                                </div>
                                <div>
                                    <strong>💡 Respuesta sugerida:</strong>
                                    <div style="background: rgba(16, 185, 129, 0.1); padding: 12px; border-radius: 6px; margin-top: 8px; border-left: 3px solid #10b981;">
                                        ${r.respuesta_correcta}
                                    </div>
                                </div>
                                <div style="margin-top: 12px;">
                                    <strong>🧠 Explicación del experto:</strong>
                                    <div style="background: rgba(249, 115, 22, 0.1); padding: 12px; border-radius: 6px; margin-top: 8px; border-left: 3px solid #f97316;">
                                        ${r.explicacion}
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        // Pregunta cerrada - mostrar feedback normal
                        fb.className = 'feedback ' + (r.correcta ? 'correct' : 'incorrect');
                        fb.innerHTML = `
                            <span style="font-size: 20px; margin-right: 8px;">${r.correcta ? '✅' : '❌'}</span>
                            <div>
                                <strong>${r.correcta ? '¡Correcto!' : 'Incorrecto'}</strong>
                                <div style="margin-top: 4px; font-size: 14px; color: var(--gray-600);">
                                    ${r.explicacion}
                                </div>
                            </div>
                        `;
                    }
                });

                // Mostrar estadísticas arriba: solo de preguntas cerradas calificadas
                const calificadas = resultado.respuestas.filter(r => r.correcta !== null);
                const total = calificadas.length;
                const buenas = calificadas.filter(r => r.correcta === true).length;
                const malas = total - buenas;
                
                document.getElementById('statBuenas').textContent = buenas;
                document.getElementById('statMalas').textContent = malas;
                document.getElementById('statTotal').textContent = total;
                const stats = document.getElementById('resultStats');
                stats.style.display = 'flex';

                // Ocultar "Evaluar Respuestas" y mostrar "Volver al Inicio"
                const btnEvaluar = document.querySelector('.btn-evaluate');
                if (btnEvaluar) {
                    btnEvaluar.style.display = 'none';
                }

                const actionsDiv = document.querySelector('.evaluation-actions');
                if (actionsDiv && !actionsDiv.querySelector('.btn-home')) {
                    const btnVolver = document.createElement('a');
                    btnVolver.href = '/';
                    btnVolver.className = 'btn-home';
                    btnVolver.innerHTML = '🏠 Volver al Inicio';
                    actionsDiv.appendChild(btnVolver);
                    
                    // Mostrar mensaje de conclusión
                    const conclusion = document.createElement('div');
                    conclusion.style.cssText = `
                        background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
                        border: 1px solid #7dd3fc;
                        border-radius: var(--border-radius);
                        padding: 20px;
                        margin-top: 20px;
                        text-align: center;
                        color: #0369a1;
                    `;
                    conclusion.innerHTML = `
                        <h3 style="margin-bottom: 10px; font-family: 'Playfair Display', serif;">🎉 ¡Evaluación completada!</h3>
                        <p style="margin-bottom: 8px;">Has respondido ${preguntas.length} preguntas de reflexión y aprendizaje.</p>
                        <p>Las preguntas ${total > 0 ? `cerradas (${buenas}/${total}) correctas` : 'cerradas'} contribuyen a tu calificación.</p>
                    `;
                    actionsDiv.parentNode.insertBefore(conclusion, actionsDiv);
                }
            } else {
                showMessage('Error al evaluar: ' + resultado.error, 'error');
            }

        } catch(err){
            console.error(err);
            showMessage('Error de conexión', 'error');
        } finally {
            overlay.remove();
            btn.disabled=false;
            btn.classList.remove('evaluating');
            btn.innerHTML = '📊 Evaluar Respuestas';
        }
    }
</script>
</body>
</html>
